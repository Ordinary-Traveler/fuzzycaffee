<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuzzy Coffee</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>☕ Experiencia Fuzzy Coffee</h1>
        <p>Ajuste seu café usando lógica nebulosa</p>

        <div class="controls">
            <div class="input-group">
                <label>Corpo do Café (Leve a Encorpado)</label>
                <input type="range" id="inputCorpo" min="0" max="100" value="50">
                <span id="valCorpo">50</span>
            </div>

            <div class="input-group">
                <label>Acidez (Baixa a Alta)</label>
                <input type="range" id="inputAcidez" min="0" max="100" value="50">
                <span id="valAcidez">50</span>
            </div>
        </div>

        <div class="display-area">
            <div id="grao-cafe"></div>
            <div class="status">
                <h3>Status da Torra: <span id="statusTorra">Média</span></h3>
                <p id="raciocinio">Aguardando ajuste...</p>
            </div>
        </div>

        <div class="visual-fuzzy">
            <canvas id="canvasCorpo" width="400" height="150"></canvas>
            <canvas id="canvasAcidez" width="400" height="150"></canvas>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/graphics.js"></script>
</body>
</html>
