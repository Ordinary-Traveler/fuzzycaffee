<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuzzy Coffee</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>☕ Fuzzy Coffee Lab</h1>
        
        <div class="main-layout">
            <div class="setup-panel">
                <div class="input-group">
                    <label>Corpo: <span id="valCorpo" class="badge">50</span></label>
                    <input type="range" id="inputCorpo" min="0" max="100" value="50">
                    <canvas id="canvasCorpo" width="300" height="100"></canvas>
                </div>

                <div class="input-group">
                    <label>Acidez: <span id="valAcidez" class="badge">50</span></label>
                    <input type="range" id="inputAcidez" min="0" max="100" value="50">
                    <canvas id="canvasAcidez" width="300" height="100"></canvas>
                </div>
            </div>

            <div class="production-panel">
                <div id="wrapper-grao">
                    <div id="grao-cafe"></div>
                    <div class="vapor"><span></span><span></span><span></span></div>
                </div>
                
                <div class="result-card">
                    <small>STATUS DA TORRA</small>
                    <h2 id="statusTorra">Média</h2>
                    <div class="progress-bar-container">
                        <div id="barraProgresso" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="raciocinio" class="logic-debug"></div>
    </div>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/graphics.js"></script>
</body>
</html>
